<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - SnapCut AI</title>
    <style>
        body { font-family: 'Inter', sans-serif; line-height: 1.6; color: #1e293b; max-width: 800px; margin: 0 auto; padding: 2rem; background: #f8fafc; }
        .container { background: white; padding: 3rem; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { color: #2563eb; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem; }
        .contact-info { margin-top: 2rem; }
        .contact-item { margin-bottom: 1.5rem; }
        .label { font-weight: 700; color: #64748b; display: block; }
        .value { font-size: 1.1rem; color: #0f172a; }
        .back-link { display: inline-block; margin-bottom: 2rem; color: #2563eb; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <a href="/" class="back-link">← Back to Home</a>
    <div class="container">
        <h1>Contact Us</h1>
        <div class="contact-info">
            <div class="contact-item">
                <span class="label">Trade Name</span>
                <span class="value">SnapCut AI Solutions</span>
            </div>
            <div class="contact-item">
                <span class="label">Email</span>
                <span class="value">support@snapcut.ai</span>
            </div>
            <div class="contact-item">
                <span class="label">Phone</span>
                <span class="value">+91 98765 43210</span>
            </div>
            <div class="contact-item">
                <span class="label">Registered Address</span>
                <span class="value">123, Tech Park, Sector 62, Noida, Uttar Pradesh, 201301</span>
            </div>
        </div>
    </div>
</body>
</html>
